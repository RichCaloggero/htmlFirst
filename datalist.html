<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>
<body>
<h1>Simple Select List Demo</h1>

<div class="select country" id="datalist-select-country">
<label>Select country (HTML datalist):
<br><input role="combobox" type="search" list="countries-datalist" aria-autocomplete="both" name="country">
</label>
<datalist id="countries-datalist"></datalist>
</div>

<div role="status"></div>

<script type="module">
import { countries } from "./countries.js";

const _timeout = null;
loadList(countries, {container: document.querySelector("#datalist-select-country datalist")});

document.querySelector("#datalist-select-country input").addEventListener("input", reportMatchCount);

function reportMatchCount (e) {
const $input = e.target;
const $list = document.getElementById($input.getAttribute("list"));
const $items = $list.querySelectorAll("option");
const value = $input.value;
const $status = document.querySelector("[role='status']");

if (_timeout) clearTimeout(_timeout);
console.log("value: ", value);

const matches = [...$items].filter(item => item.textContent.toLowerCase().includes(value.toLowerCase()));

$status.textContent = `${matches.length} items found.`;
setTimeout(() => $status.textContent = "", 7000);
} // reportMatchCount

function loadList (values, options = {}) {
const {container: $container = "ul", itemContainer = "option", valueContainer = "", hidden = false} = options;

for (const value of   values) {
const $item = document.createElement(itemContainer);
const $value = valueContainer? document.createElement(valueContainer) : $item;
$value.className = "value";
$value.textContent = value;

if ($value !== $item) $item.appendChild($value);
$container.appendChild($item);
} // for

$container.hidden = hidden;
return $container;
} // loadList


</script>

</body>
</html>
